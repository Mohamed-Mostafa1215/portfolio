<div class="space-y-12 animate-fade-in-up">
  <!-- Team Section -->
  <section class="space-y-12">
    <div class="text-center space-y-4 max-w-3xl mx-auto">
       <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">Our Team</h1>
       <p class="text-gray-400 text-lg">We built an expert team for your web development needs</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (member of team; track member.id) {
        @defer (on viewport) {
          <app-glass-card padding="lg" class="text-center neon-box rounded-2xl block h-full">
            <div class="flex flex-col items-center">
              <div class="w-24 h-24 rounded-full overflow-hidden mb-6 border-2 border-[#0ff] shadow-[0_0_15px_rgba(0,255,255,0.4)]">
                <img [src]="member.image" [alt]="member.name" class="w-full h-full object-cover">
              </div>
              <h3 class="text-xl font-bold text-white mb-1">{{ member.name }}</h3>
              <p class="text-sm font-medium text-gray-400 mb-6">{{ member.role }}</p>
              
              <div class="flex items-center gap-3">
                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" class="w-8 h-8 rounded-full bg-[#1e3a47] hover:bg-[#0ff] hover:text-black text-[#0ff] transition-colors flex items-center justify-center" aria-label="Facebook">
                  <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
                </a>
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="w-8 h-8 rounded-full bg-[#1e3a47] hover:bg-[#0ff] hover:text-black text-[#0ff] transition-colors flex items-center justify-center" aria-label="Twitter">
                  <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="w-8 h-8 rounded-full bg-[#1e3a47] hover:bg-[#0ff] hover:text-black text-[#0ff] transition-colors flex items-center justify-center" aria-label="Instagram">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                </a>
              </div>
            </div>
          </app-glass-card>
        } @placeholder {
          <div class="h-64 rounded-2xl bg-[#0b1b21] animate-pulse border border-[#1e3a47]"></div>
        }
      }
    </div>
  </section>
</div>
