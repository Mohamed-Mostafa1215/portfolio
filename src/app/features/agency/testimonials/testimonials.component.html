<div class="space-y-12 animate-fade-in-up">
  <div class="text-center space-y-4 max-w-3xl mx-auto">
     <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">Client Testimonials</h1>
     <p class="text-gray-400 text-lg">Hear what our clients have to say about working with us.</p>
  </div>

  <!-- Decorative quotes -->
  <div class="relative max-w-5xl mx-auto">
    <div class="absolute -top-12 -left-8 text-[#0ff] text-8xl opacity-30 font-serif">"</div>
    <div class="absolute -bottom-16 -right-8 text-[#0ff] text-8xl opacity-30 font-serif" style="transform: scaleX(-1);">"</div>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
      @for (testim of testimonials; track testim.id) {
        @defer (on viewport) {
          <app-glass-card padding="md" class="h-full flex flex-col">
            <div class="text-[#0ff] text-4xl mb-4 font-serif">"</div>
            <p class="text-gray-300 text-sm leading-relaxed mb-8 flex-grow">
              "{{ testim.text }}"
            </p>
            <div class="flex items-center gap-4 mt-auto">
              <img [src]="testim.image" [alt]="testim.author" class="w-10 h-10 rounded-full border border-[#1e3a47]">
              <div>
                <h4 class="text-sm font-bold text-white">{{ testim.author }}</h4>
                <p class="text-xs text-gray-500">{{ testim.authorRole }}</p>
              </div>
            </div>
          </app-glass-card>
        } @placeholder {
          <div class="h-48 rounded-2xl bg-[#0b1b21] animate-pulse border border-[#1e3a47]"></div>
        }
      }
    </div>
  </div>
</div>
