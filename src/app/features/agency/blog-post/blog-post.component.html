<div class="animate-fade-in-up pb-20" dir="rtl">
  @if (post) {
    <!-- Article Header -->
    <div class="max-w-4xl mx-auto mb-10 text-center">
      <a routerLink="/agency/blog" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-[#0ff] mb-6 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        العودة للمدونة
      </a>
      
      <h1 class="text-3xl md:text-5xl font-bold text-white mb-6 leading-tight">{{ post.title }}</h1>
      
      <div class="flex items-center justify-center gap-6 text-sm text-gray-500">
        <span class="flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          {{ post.date }}
        </span>
        <span class="flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          {{ post.readTime }} قراءة
        </span>
      </div>
    </div>

    <!-- Article Image -->
    <div class="max-w-5xl mx-auto rounded-3xl overflow-hidden mb-12 shadow-[0_0_30px_rgba(0,255,255,0.1)] border border-[#1e3a47]">
      <img [src]="post.image" [alt]="post.title" class="w-full max-h-[500px] object-cover">
    </div>

    <!-- Article Content -->
    <article class="max-w-3xl mx-auto prose prose-invert prose-cyan lg:prose-lg text-gray-300">
      <div [innerHTML]="post.content"></div>
    </article>

    <!-- Call to Action -->
    <div class="max-w-3xl mx-auto mt-20 p-8 rounded-2xl bg-gradient-to-r from-[#0b1b21] to-[#071318] border border-[#0ff]/30 text-center relative overflow-hidden shadow-[0_0_20px_rgba(0,255,255,0.05)]">
      <div class="absolute top-0 right-0 w-32 h-32 bg-[#0ff]/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
      <h3 class="text-2xl font-bold text-white mb-4 relative z-10">هل أنت مستعد لمضاعفة مبيعاتك؟</h3>
      <p class="text-gray-400 mb-8 max-w-xl mx-auto relative z-10">لا تدع منافسيك يسرقون عملاءك. تواصل معنا اليوم لتحصل على استشارة مجانية ونبدأ في بناء موقعك الاحترافي.</p>
      <a routerLink="/agency/contact" class="inline-block px-8 py-3 rounded-full font-bold text-sm bg-[#0ff] text-black shadow-[0_0_20px_rgba(0,255,255,0.4)] hover:shadow-[0_0_35px_rgba(0,255,255,0.7)] hover:scale-105 transition-all cursor-pointer relative z-10">
        احجز استشارتك المجانية
      </a>
    </div>
  } @else {
    <div class="text-center py-20">
      <h2 class="text-3xl text-white font-bold mb-4">المقال غير موجود</h2>
      <a routerLink="/agency/blog" class="text-[#0ff] hover:underline">العودة للمدونة</a>
    </div>
  }
</div>
