<div class="animate-fade-in-up space-y-12 pb-20">
  <!-- Header -->
  <div class="text-center space-y-4 max-w-3xl mx-auto">
    <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">المدونة</h1>
    <p class="text-gray-400 text-lg">مقالات ونصائح استراتيجية لمضاعفة أرباح نشاطك التجاري أونلاين.</p>
  </div>

  <!-- Blog Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" dir="rtl">
    @for (post of posts; track post.id) {
      <app-glass-card padding="sm" class="neon-box rounded-2xl block h-full group hover:-translate-y-2 transition-transform duration-300">
        <div class="flex flex-col h-full">
          <!-- Image -->
          <div class="rounded-xl overflow-hidden mb-5 relative group h-48">
            <a [routerLink]="['/agency/blog', post.slug]" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 flex items-center justify-center cursor-pointer">
              <span class="text-[#0ff] font-semibold tracking-wide">اقرأ المقال</span>
            </a>
            <img [src]="post.image" [alt]="post.title" loading="lazy" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
          </div>
          
          <!-- Content -->
          <div class="flex-grow flex flex-col px-2">
            <div class="flex items-center gap-4 text-xs text-gray-500 mb-3">
              <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg> {{ post.date }}</span>
              <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> {{ post.readTime }}</span>
            </div>
            
            <h3 class="text-xl font-bold text-white mb-3 hover:text-[#0ff] transition-colors">
              <a [routerLink]="['/agency/blog', post.slug]">{{ post.title }}</a>
            </h3>
            <p class="text-sm text-gray-400 leading-relaxed mb-6 flex-grow">{{ post.excerpt }}</p>
            
            <!-- Read More -->
            <div class="mt-auto pt-4 border-t border-[#1e3a47]">
              <a [routerLink]="['/agency/blog', post.slug]" class="text-[#0ff] text-sm font-semibold flex items-center gap-2 group-hover:-translate-x-1 transition-transform">
                اقرأ المزيد <svg class="w-4 h-4 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </a>
            </div>
          </div>
        </div>
      </app-glass-card>
    } @empty {
      <div class="col-span-full text-center text-gray-500 py-12">لا توجد مقالات حالياً.</div>
    }
  </div>
</div>
