@for (item of [].constructor(count); track $index) {
  @if (variant === 'text') {
    <div 
      class="skeleton-text animate-pulse"
      [style.width]="width"
      [style.height]="height"
      [style.border-radius]="borderRadius"
      role="status"
      aria-label="Loading..."
    ></div>
  }
  
  @if (variant === 'circular') {
    <div 
      class="skeleton-circular animate-pulse"
      [style.width]="width"
      [style.height]="height"
      role="status"
      aria-label="Loading..."
    ></div>
  }
  
  @if (variant === 'rectangular') {
    <div 
      class="skeleton-rectangular animate-pulse"
      [style.width]="width"
      [style.height]="height"
      [style.border-radius]="borderRadius"
      role="status"
      aria-label="Loading..."
    ></div>
  }
  
  @if (variant === 'card') {
    <div 
      class="skeleton-card animate-pulse"
      [style.border-radius]="borderRadius"
      role="status"
      aria-label="Loading content..."
    >
      <div class="skeleton-image"></div>
      <div class="skeleton-content">
        <div class="skeleton-line w-3/4 h-4"></div>
        <div class="skeleton-line w-full h-3 mt-2"></div>
        <div class="skeleton-line w-5/6 h-3 mt-2"></div>
      </div>
    </div>
  }
}

<span class="sr-only">Loading...</span>
